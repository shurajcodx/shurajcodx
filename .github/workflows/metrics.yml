name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  overview:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics_renders/overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shurajcodx

          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kathmandu

  languages:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics_renders/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shurajcodx

          base: ""

          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 20
          plugin_languages_sections: most-used,recent
          plugin_languages_recent_days: 365

  achievements:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics_renders/achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shurajcodx

          base: ""

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed

  repositories:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics_renders/repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shurajcodx

          base: repositories

          plugin_repositories: yes
          plugin_repositories_featured: shurajcodx/encoradb,shurajcodx/android-app-rating-dialog
          plugin_repositories_pinned: 6

  calendar:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics_renders/calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shurajcodx

          base: ""

          plugin_isocalendar: yes

  habits:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics_renders/habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: shurajcodx

          base: ""

          plugin_lines: yes
          plugin_followup: yes
          plugin_topics: yes
          plugin_topics_limit: 20
